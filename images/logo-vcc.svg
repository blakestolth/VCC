<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" fill="#1a1a1a">
  <!-- Mountains -->
  <g>
    <!-- Left mountain range -->
    <polygon points="60,170 130,80 160,120 190,70 220,130 240,100 260,170"/>
    <!-- Main center peak -->
    <polygon points="140,170 210,50 230,90 260,30 290,90 310,60 340,170"/>
    <!-- Right mountain with window/door cutout -->
    <polygon points="260,170 310,90 330,120 360,70 390,130 400,170"/>
    <!-- Window cutout on right mountain (negative space) -->
    <rect x="335" y="105" width="22" height="18" rx="1" fill="white" transform="rotate(-12 346 114)"/>
    <rect x="340" y="125" width="15" height="12" rx="1" fill="white" transform="rotate(-8 348 131)"/>
  </g>

  <!-- Horizontal lines under mountains -->
  <rect x="30" y="172" width="440" height="5" rx="1"/>

  <!-- VIC COAST text -->
  <text x="260" y="228" text-anchor="middle" font-family="'Impact','Arial Black','Helvetica Neue',sans-serif" font-weight="900" font-size="72" letter-spacing="6" fill="#1a1a1a" style="font-stretch:condensed">VIC COAST</text>

  <!-- Decorative lines around CONTRACTING LTD -->
  <rect x="80" y="245" width="120" height="3" rx="1"/>
  <rect x="320" y="245" width="120" height="3" rx="1"/>

  <!-- CONTRACTING LTD text -->
  <text x="260" y="262" text-anchor="middle" font-family="'Arial','Helvetica Neue',sans-serif" font-weight="700" font-size="28" letter-spacing="10" fill="#1a1a1a">CONTRACTING LTD</text>
</svg>
